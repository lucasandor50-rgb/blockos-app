<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sats Clicker ⚡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #05050a;
      --bg1:    #0c0c14;
      --bg2:    #13131e;
      --bg3:    #1a1a28;
      --bd:     #22223a;
      --bd2:    #2e2e50;
      --tx:     #eeeef8;
      --tx2:    #7878a0;
      --tx3:    #44445a;
      --orange: #f7931a;
      --gold:   #ffc93e;
      --green:  #22c55e;
      --purple: #a855f7;
      --glow:   #f7931a44;
    }
    html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--tx); font-family:'Inter',sans-serif; }

    /* PARTICLE CANVAS */
    #pcanvas { position:fixed; inset:0; pointer-events:none; z-index:9999; }

    /* BG STARS */
    #bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* LAYOUT */
    #app { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; }

    /* ── TOPBAR ── */
    #topbar {
      flex-shrink:0; height:60px; background:var(--bg1);
      border-bottom:1px solid var(--bd);
      display:flex; align-items:center; padding:0 20px; gap:16px; z-index:10;
    }
    .logo { font-size:20px; font-weight:900; color:var(--orange); letter-spacing:-1px; white-space:nowrap; }
    .logo em { font-style:normal; color:var(--tx2); font-weight:400; }

    #top-sats {
      flex:1; display:flex; align-items:baseline; gap:8px;
    }
    #top-count {
      font-family:'JetBrains Mono',monospace;
      font-size:28px; font-weight:700; color:var(--gold);
      letter-spacing:-1px; transition: color .2s;
    }
    #top-label { font-size:13px; color:var(--tx2); }
    #top-btc { font-size:11px; color:var(--tx3); font-family:'JetBrains Mono',monospace; margin-left:4px; }

    #top-right { display:flex; align-items:center; gap:20px; flex-shrink:0; }
    .top-stat { text-align:right; }
    .top-stat .ts-val { font-size:14px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--orange); }
    .top-stat .ts-lbl { font-size:10px; color:var(--tx3); }

    /* ── MAIN ── */
    #main { flex:1; display:flex; overflow:hidden; }

    /* ── LEFT ── */
    #left { width:220px; flex-shrink:0; background:var(--bg1); border-right:1px solid var(--bd); overflow-y:auto; display:flex; flex-direction:column; }
    #left::-webkit-scrollbar { width:3px; }
    #left::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:2px; }

    .section { padding:16px; border-bottom:1px solid var(--bd); }
    .sec-title { font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--tx3); margin-bottom:10px; }

    /* Stats */
    .srow { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-size:12px; }
    .srow .sl { color:var(--tx2); }
    .srow .sv { font-family:'JetBrains Mono',monospace; color:var(--tx); font-size:11px; }

    /* Click upgrades */
    .ucard {
      display:flex; align-items:center; gap:10px; padding:9px 10px;
      background:var(--bg2); border:1px solid var(--bd); border-radius:8px;
      cursor:pointer; transition:all .15s; margin-bottom:6px;
    }
    .ucard:hover:not(.u-locked):not(.u-bought) { border-color:var(--orange); background:var(--bg3); transform:translateX(2px); }
    .ucard.u-locked { opacity:.25; cursor:not-allowed; }
    .ucard.u-bought { opacity:.2; cursor:default; }
    .ucard.u-ready { border-color:#f7931a55; box-shadow:0 0 10px #f7931a22; }
    .uico { font-size:20px; }
    .uinfo { flex:1; }
    .uname { font-size:11px; font-weight:700; }
    .udesc { font-size:10px; color:var(--tx2); margin-top:1px; }
    .ucost { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--gold); font-weight:700; }

    /* Prestige */
    #prestige-wrap { padding:12px; margin-top:auto; }
    #prestige-btn {
      width:100%; padding:10px; background:linear-gradient(135deg,#6d28d9,#a855f7);
      border:none; border-radius:8px; color:#fff; font-size:12px; font-weight:700;
      cursor:pointer; display:none; box-shadow:0 0 20px #7c3aed44;
      transition:filter .15s, transform .1s;
    }
    #prestige-btn:hover { filter:brightness(1.15); transform:scale(1.02); }
    #prestige-btn.show { display:block; }

    /* ── CENTER ── */
    #center {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      position:relative; overflow:hidden;
    }

    /* Combo display */
    #combo-wrap {
      position:relative; width:240px; height:240px;
      display:flex; align-items:center; justify-content:center;
    }

    #combo-svg {
      position:absolute; inset:-10px; width:calc(100%+20px); height:calc(100%+20px);
      transform:rotate(-90deg);
    }
    #combo-track { fill:none; stroke:var(--bd); stroke-width:3; }
    #combo-arc {
      fill:none; stroke:var(--orange); stroke-width:3;
      stroke-linecap:round;
      stroke-dasharray:720; stroke-dashoffset:720;
      transition: stroke-dashoffset .1s ease, stroke .2s;
      filter:drop-shadow(0 0 6px var(--orange));
    }

    #coin {
      width:200px; height:200px; border-radius:50%;
      background:radial-gradient(circle at 38% 32%, #ffe680, #f7931a 45%, #b85c00 80%);
      box-shadow:
        0 0 0 6px #f7931a18,
        0 0 40px #f7931a44,
        0 20px 60px #00000099,
        inset 0 -10px 30px #0000004a,
        inset 0 10px 30px #ffffff22;
      cursor:pointer; user-select:none;
      display:flex; align-items:center; justify-content:center;
      font-size:88px; line-height:1;
      transition:transform .07s ease, box-shadow .07s ease;
      will-change:transform;
      position:relative; z-index:2;
    }
    #coin.pressed {
      transform:scale(.91);
      box-shadow:
        0 0 0 4px #f7931a0a,
        0 0 15px #f7931a22,
        0 6px 20px #00000099,
        inset 0 -5px 15px #0000004a,
        inset 0 6px 15px #ffffff12;
    }
    #coin.crit {
      animation: crit-flash .2s ease;
    }
    @keyframes crit-flash {
      0% { box-shadow: 0 0 0 0 #ffffff55, 0 0 60px #f7931a88; }
      100% { box-shadow: 0 0 0 30px #ffffff00, 0 0 40px #f7931a44; }
    }

    /* Combo label */
    #combo-label {
      position:absolute; top:-36px; left:50%; transform:translateX(-50%);
      font-size:12px; font-weight:800; color:var(--orange);
      opacity:0; transition:opacity .2s;
      white-space:nowrap; letter-spacing:1px;
      text-shadow:0 0 10px var(--orange);
    }
    #combo-label.show { opacity:1; }

    /* Next goal */
    #goal-area { text-align:center; }
    #goal-label { font-size:11px; color:var(--tx2); margin-bottom:6px; }
    #goal-track {
      width:200px; height:4px; background:var(--bg3);
      border-radius:4px; overflow:hidden; margin:0 auto;
    }
    #goal-fill {
      height:100%; background:linear-gradient(90deg,var(--orange),var(--gold));
      border-radius:4px; transition:width .3s ease;
    }

    /* CPC label */
    #cpc-area { font-size:13px; color:var(--tx2); }
    #cpc-area strong { color:var(--gold); }

    /* FLOATERS */
    .floater {
      position:fixed; pointer-events:none; z-index:9998;
      font-family:'JetBrains Mono',monospace; font-weight:800;
      color:var(--gold); text-shadow:0 0 10px #f7931a99;
      animation:float-up .85s ease-out forwards;
    }
    .floater.big { font-size:22px; color:#fff; text-shadow:0 0 15px var(--gold); }
    .floater.crit-float { color:#fff; font-size:24px; }
    @keyframes float-up {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      70%  { opacity:.9; }
      100% { opacity:0; transform:translateY(-90px) scale(.6); }
    }

    /* ── RIGHT (SHOP) ── */
    #right { width:270px; flex-shrink:0; background:var(--bg1); border-left:1px solid var(--bd); overflow-y:auto; display:flex; flex-direction:column; }
    #right::-webkit-scrollbar { width:3px; }
    #right::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:2px; }

    #shop-header {
      padding:14px 16px 10px; border-bottom:1px solid var(--bd);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    #buy-mode-btn {
      background:var(--bg3); border:1px solid var(--bd2); border-radius:20px;
      color:var(--tx); font-size:11px; font-weight:700; padding:4px 12px;
      cursor:pointer; transition:all .15s;
    }
    #buy-mode-btn:hover { border-color:var(--orange); color:var(--orange); }

    #buildings-list { padding:12px; display:flex; flex-direction:column; gap:6px; }

    .bcard {
      background:var(--bg2); border:1px solid var(--bd); border-radius:10px;
      cursor:pointer; transition:all .18s; overflow:hidden;
      position:relative;
    }
    .bcard:hover:not(.b-locked) { border-color:#f7931a88; background:var(--bg3); }
    .bcard.b-affordable {
      border-color:#f7931a55;
      box-shadow:0 0 12px #f7931a1a;
    }
    .bcard.b-affordable:hover { border-color:var(--orange); box-shadow:0 0 20px #f7931a33; }
    .bcard.b-locked { opacity:.22; cursor:not-allowed; }

    .bcard-inner { padding:10px 12px; display:flex; align-items:center; gap:10px; }
    .bico { font-size:26px; line-height:1; flex-shrink:0; }
    .binfo { flex:1; min-width:0; }
    .bname { font-size:12px; font-weight:700; }
    .bdesc { font-size:10px; color:var(--tx2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bright { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
    .bcost { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--gold); font-weight:700; }
    .b-locked .bcost { color:var(--tx3); }
    .bcps { font-size:10px; color:var(--tx2); }
    .bcount {
      position:absolute; top:6px; right:8px;
      background:var(--orange); color:#000;
      font-size:10px; font-weight:800;
      border-radius:20px; padding:1px 7px; min-width:22px; text-align:center;
    }

    /* Progress bar inside building card */
    .bprog { height:2px; background:var(--bg3); }
    .bprog-fill { height:100%; background:linear-gradient(90deg,var(--orange),var(--gold)); transition:width 1s linear; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(90px);
      background:linear-gradient(135deg,var(--bg2),var(--bg3));
      border:1px solid var(--gold); border-radius:14px;
      padding:14px 22px; display:flex; align-items:center; gap:14px;
      box-shadow:0 8px 40px #00000088, 0 0 30px #ffc93e22;
      transition:transform .45s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      z-index:10000; pointer-events:none; white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
    .t-ico { font-size:28px; }
    .t-text strong { font-size:13px; color:var(--gold); display:block; }
    .t-text span { font-size:11px; color:var(--tx2); }

    /* ── SAVE INDICATOR ── */
    #save-flash {
      position:fixed; top:70px; right:16px;
      font-size:11px; color:var(--green);
      opacity:0; transition:opacity .3s; z-index:100;
      pointer-events:none;
    }

    /* ── MOBILE ── */
    @media (max-width:700px) {
      html,body { height:100dvh; }
      #topbar { height:52px; padding:0 12px; gap:10px; }
      #top-count { font-size:22px; }
      #top-right { gap:12px; }
      .top-stat .ts-val { font-size:12px; }
      #main { flex-direction:column; }
      #left, #right { display:none; }
      #left.m-on, #right.m-on { display:flex; width:100%; border:none; }
      #center { display:none; }
      #center.m-on { display:flex; flex:1; }
      #coin { width:170px; height:170px; font-size:76px; }
      #combo-wrap { width:200px; height:200px; }
      #mobile-nav {
        display:flex; height:54px; background:var(--bg1);
        border-top:1px solid var(--bd); flex-shrink:0;
      }
      .mnav {
        flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:2px; border:none; background:none; color:var(--tx2);
        font-size:10px; font-weight:600; cursor:pointer; transition:color .15s;
      }
      .mnav.on { color:var(--orange); }
      .mnav .mi { font-size:18px; }
    }
    @media (min-width:701px) {
      #mobile-nav { display:none; }
      #center { display:flex !important; }
      #left, #right { display:flex !important; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="pcanvas"></canvas>

<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo">⚡ Sats<em>Clicker</em></div>
    <div id="top-sats">
      <span id="top-count">0</span>
      <span id="top-label">sats</span>
      <span id="top-btc"></span>
    </div>
    <div id="top-right">
      <div class="top-stat">
        <div class="ts-val" id="ts-cps">0</div>
        <div class="ts-lbl">sats/s</div>
      </div>
      <div class="top-stat">
        <div class="ts-val" id="ts-cpc">1</div>
        <div class="ts-lbl">pro Klick</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- LEFT -->
    <div id="left" class="m-on">
      <div class="section">
        <div class="sec-title">📊 Stats</div>
        <div class="srow"><span class="sl">Gesamt gemint</span><span class="sv" id="s-total">0</span></div>
        <div class="srow"><span class="sl">Klicks</span><span class="sv" id="s-clicks">0</span></div>
        <div class="srow"><span class="sl">Laufzeit</span><span class="sv" id="s-time">0:00</span></div>
        <div class="srow"><span class="sl">Prestige</span><span class="sv" id="s-prestige">×1</span></div>
      </div>
      <div class="section" style="flex:1;">
        <div class="sec-title">⚡ Klick-Upgrades</div>
        <div id="upgrades-list"></div>
      </div>
      <div id="prestige-wrap">
        <button id="prestige-btn" onclick="prestige()">
          🌟 Prestige — Reset für ×2 Bonus
        </button>
      </div>
    </div>

    <!-- CENTER -->
    <div id="center" class="m-on">
      <div id="combo-label" id="combo-lbl"></div>

      <div id="combo-wrap">
        <svg id="combo-svg" viewBox="0 0 260 260">
          <circle id="combo-track" cx="130" cy="130" r="114"/>
          <circle id="combo-arc"   cx="130" cy="130" r="114"/>
        </svg>
        <div id="coin" onmousedown="handleClick(event)" ontouchstart="handleClick(event)">₿</div>
      </div>

      <div id="cpc-area">+<strong id="cpc-val">1</strong> sat pro Klick</div>

      <div id="goal-area">
        <div id="goal-label">Ziel: 100 sats</div>
        <div id="goal-track"><div id="goal-fill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div id="right">
      <div id="shop-header">
        <div class="sec-title" style="margin:0">⛏️ Miner Shop</div>
        <button id="buy-mode-btn" onclick="toggleBuyMode()">×1</button>
      </div>
      <div id="buildings-list"></div>
    </div>

  </div>

  <!-- MOBILE NAV -->
  <div id="mobile-nav">
    <button class="mnav" onclick="mTab('left')" id="mn-left"><span class="mi">📊</span>Stats</button>
    <button class="mnav on" onclick="mTab('center')" id="mn-center"><span class="mi">₿</span>Minen</button>
    <button class="mnav" onclick="mTab('right')" id="mn-right"><span class="mi">🏪</span>Shop</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <span class="t-ico" id="t-ico">🏆</span>
  <div class="t-text"><strong id="t-title">Title</strong><span id="t-desc">Desc</span></div>
</div>

<div id="save-flash">💾 Gespeichert</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const BUILDINGS = [
  { id:'laptop',    name:'Laptop',           icon:'💻', desc:'Alter Laptop mit cpuminer.',            baseCost:15,          baseCps:0.1    },
  { id:'gpu',       name:'GPU Rig',           icon:'🖥️', desc:'8× RTX 4090. Läuft heiß.',              baseCost:100,         baseCps:0.5    },
  { id:'asic',      name:'ASIC Miner',        icon:'⚙️', desc:'Antminer S21. Laut & effizient.',       baseCost:1100,        baseCps:4      },
  { id:'container', name:'Miner Container',   icon:'📦', desc:'Ganzer Container voller Miner.',        baseCost:12000,       baseCps:20     },
  { id:'farm',      name:'Mining Farm',       icon:'🏭', desc:'Industrielle Skalierung.',              baseCost:130000,      baseCps:100    },
  { id:'pool',      name:'Mining Pool',       icon:'🌐', desc:'Tausende Miner koordiniert.',           baseCost:1400000,     baseCps:400    },
  { id:'lightning', name:'Lightning Node',    icon:'⚡', desc:'Millionen in Mikrozahlungen.',          baseCost:20000000,    baseCps:1600   },
  { id:'etf',       name:'Bitcoin ETF',       icon:'📈', desc:'Wall Street hat kapituliert.',          baseCost:330000000,   baseCps:6666   },
  { id:'satoshi',   name:"Satoshi's Laptop",  icon:'🔮', desc:'Das Original. Generiert aus dem Nichts.',baseCost:5100000000, baseCps:26000  },
];

const UPGRADES = [
  { id:'u1', name:'Mining Handschuhe',  icon:'🧤', cost:100,        bonus:1,     desc:'+1 sat/Klick'    },
  { id:'u2', name:'Spitzhacke',         icon:'⛏️', cost:500,        bonus:4,     desc:'+5 sat/Klick'    },
  { id:'u3', name:'Diamant Spitzhacke', icon:'💎', cost:3000,       bonus:15,    desc:'+20 sat/Klick'   },
  { id:'u4', name:'Quantenminer',       icon:'🔬', cost:20000,      bonus:50,    desc:'+50 sat/Klick'   },
  { id:'u5', name:'Erleuchtung',        icon:'🧘', cost:200000,     bonus:150,   desc:'+150 sat/Klick'  },
  { id:'u6', name:'Satoshi Segen',      icon:'✨', cost:2000000,    bonus:500,   desc:'+500 sat/Klick'  },
  { id:'u7', name:'Block Reward',       icon:'🏅', cost:25000000,   bonus:2000,  desc:'+2k sat/Klick'   },
  { id:'u8', name:'Genesis Block',      icon:'🌍', cost:500000000,  bonus:10000, desc:'+10k sat/Klick'  },
];

const MILESTONES = [
  { sats:100,           ico:'🌱', title:'Erste Sats!',    desc:'100 sats gemint'        },
  { sats:1e3,           ico:'⚡', title:'Kilosat!',       desc:'1.000 sats gemint'      },
  { sats:1e4,           ico:'🔥', title:'Zehntausend!',  desc:'10.000 sats gemint'     },
  { sats:1e5,           ico:'💪', title:'Six Figures',   desc:'100.000 sats gemint'    },
  { sats:1e6,           ico:'🎰', title:'Sat Millionär', desc:'1 Million sats gemint'  },
  { sats:1e7,           ico:'🚀', title:'To the Moon',   desc:'10 Mio. sats gemint'    },
  { sats:1e8,           ico:'₿',  title:'1 Bitcoin!!',   desc:'Ein ganzer BTC ⚡'      },
  { sats:1e10,          ico:'👑', title:'Bitcoin Baron', desc:'100 BTC gemint'         },
  { sats:2.1e12,        ico:'♾️', title:'21 Mio. BTC!', desc:'Max Supply erreicht!'   },
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const SAVE_KEY = 'sats_clicker_v2';
let buyMode = 1; // 1, 10, 100

let G = {
  sats: 0, totalSats: 0, clicks: 0,
  prestigeBonus: 1, prestigeCount: 0,
  buildings: {}, upgrades: [], milestones: [],
  startTime: Date.now(),
};
BUILDINGS.forEach(b => G.buildings[b.id] = 0);

// ═══════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════
function cpc() {
  let base = 1;
  G.upgrades.forEach(id => {
    const u = UPGRADES.find(x=>x.id===id);
    if (u) base += u.bonus;
  });
  return base * G.prestigeBonus * comboMult;
}

function cps() {
  let total = 0;
  BUILDINGS.forEach(b => { total += b.baseCps * (G.buildings[b.id]||0); });
  return total * G.prestigeBonus;
}

function bCost(b, qty=1) {
  const owned = G.buildings[b.id]||0;
  let cost = 0;
  for (let i=0; i<qty; i++) cost += Math.floor(b.baseCost * Math.pow(1.15, owned+i));
  return cost;
}

function canAffordN(b, qty) { return G.sats >= bCost(b, qty); }

// ═══════════════════════════════════════════════
// FORMAT
// ═══════════════════════════════════════════════
function fmt(n) {
  n = Math.floor(n);
  if (n < 0) return '0';
  if (n < 1e3)  return n.toString();
  if (n < 1e6)  return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'k';
  if (n < 1e9)  return (n/1e6).toFixed(2) + 'M';
  if (n < 1e12) return (n/1e9).toFixed(2) + 'B';
  if (n < 1e15) return (n/1e12).toFixed(2) + 'T';
  return (n/1e15).toFixed(2) + 'Qa';
}
function fmtTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  if (h > 0) return `${h}h ${m%60}m`;
  return `${m}:${String(s%60).padStart(2,'0')}`;
}
function fmtBTC(sats) {
  const btc = sats / 1e8;
  if (btc < 0.0001) return '';
  return '≈ ' + btc.toFixed(5) + ' BTC';
}

// ═══════════════════════════════════════════════
// COMBO SYSTEM
// ═══════════════════════════════════════════════
let comboMult = 1, comboEnergy = 0, comboTimer = null;
const COMBO_DECAY = 1200; // ms to lose combo
const COMBO_STEPS = [1, 1.5, 2, 3, 5]; // energy 0-4

function addComboEnergy() {
  comboEnergy = Math.min(4, comboEnergy + 1);
  comboMult = COMBO_STEPS[comboEnergy];
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => {
    comboEnergy = Math.max(0, comboEnergy - 1);
    comboMult = COMBO_STEPS[comboEnergy];
    updateComboUI();
  }, COMBO_DECAY);
  updateComboUI();
}

function updateComboUI() {
  const arc = document.getElementById('combo-arc');
  const lbl = document.getElementById('combo-label');
  const circumf = 2 * Math.PI * 114; // r=114
  const pct = comboEnergy / 4;
  arc.style.strokeDashoffset = circumf * (1 - pct);

  // Color based on level
  const colors = ['#f7931a','#f7931a','#ffc93e','#22c55e','#a855f7'];
  arc.style.stroke = colors[comboEnergy];

  if (comboEnergy >= 2) {
    lbl.textContent = `COMBO ×${comboMult}`;
    lbl.classList.add('show');
  } else {
    lbl.classList.remove('show');
  }
}

// ═══════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════
const pc = document.getElementById('pcanvas');
const pctx = pc.getContext('2d');
let particles = [];

function resizeCanvas() {
  pc.width = window.innerWidth;
  pc.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnParticles(x, y, count, isCrit) {
  const colors = isCrit
    ? ['#ffffff','#ffc93e','#f7931a','#fffde0']
    : ['#f7931a','#ffc93e','#ffebb0','#fff'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = isCrit ? (3 + Math.random()*6) : (1.5 + Math.random()*4);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (isCrit ? 3 : 1),
      life: 1, maxLife: 1,
      size: isCrit ? (3+Math.random()*4) : (1.5+Math.random()*2.5),
      color: colors[Math.floor(Math.random()*colors.length)],
      shape: isCrit && Math.random()>.5 ? 'star' : 'circle',
    });
  }
}

function drawStar(ctx, x, y, r) {
  ctx.beginPath();
  for (let i=0; i<5; i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const a2 = ((i*4+2)*Math.PI/5) - Math.PI/2;
    if (i===0) ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    else ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a2)*(r*.4), y+Math.sin(a2)*(r*.4));
  }
  ctx.closePath();
}

function particleTick() {
  pctx.clearRect(0, 0, pc.width, pc.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12; p.vx *= 0.98;
    p.life -= 0.022;
    pctx.globalAlpha = p.life;
    pctx.fillStyle = p.color;
    if (p.shape === 'star') {
      drawStar(pctx, p.x, p.y, p.size);
    } else {
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    }
    pctx.fill();
  }
  pctx.globalAlpha = 1;
  requestAnimationFrame(particleTick);
}
particleTick();

// ═══════════════════════════════════════════════
// BACKGROUND STARS
// ═══════════════════════════════════════════════
const bgc = document.getElementById('bg-canvas');
const bgx = bgc.getContext('2d');
let stars = [];

function initBg() {
  bgc.width = window.innerWidth;
  bgc.height = window.innerHeight;
  stars = [];
  for (let i=0; i<80; i++) {
    stars.push({
      x: Math.random()*bgc.width,
      y: Math.random()*bgc.height,
      r: Math.random()*1.2,
      a: Math.random(),
      da: (Math.random()-.5)*.005,
    });
  }
}
window.addEventListener('resize', initBg);
initBg();

function bgTick() {
  bgx.clearRect(0,0,bgc.width,bgc.height);
  for (const s of stars) {
    s.a += s.da;
    if (s.a <= 0 || s.a >= 1) s.da *= -1;
    bgx.globalAlpha = s.a * 0.4;
    bgx.fillStyle = '#8080ff';
    bgx.beginPath();
    bgx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgx.fill();
  }
  bgx.globalAlpha = 1;
}
setInterval(bgTick, 60);

// ═══════════════════════════════════════════════
// CLICK
// ═══════════════════════════════════════════════
function handleClick(e) {
  e.preventDefault();
  const isCrit = Math.random() < 0.08; // 8% crit
  const gain = cpc() * (isCrit ? 5 : 1);
  G.sats += gain; G.totalSats += gain; G.clicks++;
  addComboEnergy();

  const coin = document.getElementById('coin');
  coin.classList.add('pressed');
  if (isCrit) coin.classList.add('crit');
  setTimeout(() => { coin.classList.remove('pressed'); coin.classList.remove('crit'); }, isCrit ? 200 : 70);

  const rect = coin.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const ex = (e.touches ? e.touches[0].clientX : e.clientX) || cx;
  const ey = (e.touches ? e.touches[0].clientY : e.clientY) || cy;
  spawnParticles(ex, ey, isCrit ? 20 : 10, isCrit);

  const fl = document.createElement('div');
  fl.className = 'floater' + (isCrit ? ' crit-float' : gain > 100 ? ' big' : '');
  fl.textContent = (isCrit ? '💥 CRIT! +' : '+') + fmt(gain);
  fl.style.left = (ex - 30 + (Math.random()*40-20)) + 'px';
  fl.style.top  = (ey - 20) + 'px';
  fl.style.fontSize = Math.min(24, 14 + Math.log10(Math.max(1,gain))*3) + 'px';
  document.body.appendChild(fl);
  setTimeout(() => fl.remove(), 900);

  dirtyShop = true;
  checkMilestones();
}

// Spacebar to click
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    const coin = document.getElementById('coin');
    const r = coin.getBoundingClientRect();
    const fake = { clientX: r.left+r.width/2, clientY: r.top+r.height/2, preventDefault:()=>{}, touches:null };
    handleClick(fake);
  }
});

// ═══════════════════════════════════════════════
// BUY
// ═══════════════════════════════════════════════
function toggleBuyMode() {
  const modes = [1,10,100];
  buyMode = modes[(modes.indexOf(buyMode)+1) % modes.length];
  document.getElementById('buy-mode-btn').textContent = '×'+buyMode;
  renderShop();
}

function buyBuilding(id) {
  const b = BUILDINGS.find(x=>x.id===id);
  if (!b) return;
  const cost = bCost(b, buyMode);
  if (G.sats < cost) return;
  G.sats -= cost;
  G.buildings[id] = (G.buildings[id]||0) + buyMode;
  dirtyShop = true;
  saveGame();
}

function buyUpgrade(id) {
  if (G.upgrades.includes(id)) return;
  const u = UPGRADES.find(x=>x.id===id);
  if (!u || G.sats < u.cost) return;
  G.sats -= u.cost;
  G.upgrades.push(id);
  dirtyShop = true;
  saveGame();
}

// ═══════════════════════════════════════════════
// MILESTONES
// ═══════════════════════════════════════════════
function checkMilestones() {
  for (const m of MILESTONES) {
    if (G.totalSats >= m.sats && !G.milestones.includes(m.sats)) {
      G.milestones.push(m.sats);
      showToast(m.ico, m.title, m.desc);
    }
  }
}

let toastQ = [], toastBusy = false;
function showToast(ico, title, desc) {
  toastQ.push({ico,title,desc});
  if (!toastBusy) drainToast();
}
function drainToast() {
  if (!toastQ.length) { toastBusy=false; return; }
  toastBusy = true;
  const {ico,title,desc} = toastQ.shift();
  const t = document.getElementById('toast');
  document.getElementById('t-ico').textContent = ico;
  document.getElementById('t-title').textContent = title;
  document.getElementById('t-desc').textContent = desc;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); setTimeout(drainToast,500); }, 3200);
}

// ═══════════════════════════════════════════════
// PRESTIGE
// ═══════════════════════════════════════════════
function prestige() {
  if (G.totalSats < 2.1e12) return;
  G.prestigeCount++;
  G.prestigeBonus = Math.pow(2, G.prestigeCount);
  G.sats = 0; G.totalSats = 0; G.clicks = 0;
  G.upgrades = []; G.milestones = [];
  BUILDINGS.forEach(b => G.buildings[b.id]=0);
  G.startTime = Date.now();
  dirtyShop = true;
  saveGame();
  showToast('🌟','Prestige!',`${G.prestigeBonus}× Multiplikator aktiv`);
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
let dirtyShop = true;
let prevAfford = {}; // track affordability per building

function renderShop() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  const totalCps = cps();
  BUILDINGS.forEach(b => {
    const cost = bCost(b, buyMode);
    const owned = G.buildings[b.id]||0;
    const can = G.sats >= cost;
    const bCpsTotal = b.baseCps * owned * G.prestigeBonus;
    const pct = totalCps > 0 ? (bCpsTotal/totalCps)*100 : 0;

    // Time until affordable
    const remaining = cost - G.sats;
    const speed = cps();
    const eta = speed > 0 ? remaining/speed : Infinity;
    let etaStr = '';
    if (!can && speed > 0 && eta < 3600) {
      etaStr = eta < 60 ? `${Math.ceil(eta)}s` : `${Math.ceil(eta/60)}m`;
    }

    const card = document.createElement('div');
    card.className = 'bcard' + (can ? ' b-affordable' : b.baseCost > G.totalSats*1.2 && owned===0 ? ' b-locked' : '');
    card.onclick = () => buyBuilding(b.id);

    const progPct = can ? 100 : speed > 0 ? Math.min(100, (G.sats/cost)*100) : 0;

    card.innerHTML = `
      <div class="bcard-inner">
        <div class="bico">${b.icon}</div>
        <div class="binfo">
          <div class="bname">${b.name}</div>
          <div class="bdesc">${b.desc}</div>
        </div>
        <div class="bright">
          <div class="bcost">${fmt(cost)}${buyMode>1?` <span style="font-size:9px;color:var(--tx3)">×${buyMode}</span>`:''}
          </div>
          <div class="bcps">${owned>0?`+${fmt(b.baseCps*buyMode*G.prestigeBonus)}/s`:`+${fmt(b.baseCps)}/s ea`}</div>
          ${etaStr?`<div style="font-size:9px;color:var(--green)">⏱ ${etaStr}</div>`:''}
        </div>
        ${owned > 0 ? `<div class="bcount">${owned}</div>` : ''}
      </div>
      <div class="bprog"><div class="bprog-fill" style="width:${progPct}%"></div></div>
    `;
    list.appendChild(card);
  });
  dirtyShop = false;
}

function renderUpgrades() {
  const list = document.getElementById('upgrades-list');
  list.innerHTML = '';
  UPGRADES.forEach(u => {
    const bought = G.upgrades.includes(u.id);
    const can = G.sats >= u.cost && !bought;
    const div = document.createElement('div');
    div.className = 'ucard' + (bought?' u-bought': can?' u-ready':G.sats*5 < u.cost?' u-locked':'');
    if (!bought) div.onclick = () => buyUpgrade(u.id);
    div.innerHTML = `
      <div class="uico">${u.icon}</div>
      <div class="uinfo">
        <div class="uname">${u.name}</div>
        <div class="udesc">${u.desc}</div>
      </div>
      ${bought ? '<span style="font-size:14px">✅</span>' : `<div class="ucost">${fmt(u.cost)}</div>`}
    `;
    list.appendChild(div);
  });
}

let frameCount = 0;
function updateUI() {
  frameCount++;
  const s = Math.floor(G.sats);
  const curCpc = cpc(), curCps = cps();

  document.getElementById('top-count').textContent = fmt(s);
  document.getElementById('top-btc').textContent = fmtBTC(G.totalSats);
  document.getElementById('ts-cps').textContent = fmt(curCps);
  document.getElementById('ts-cpc').textContent = fmt(curCpc);
  document.getElementById('cpc-val').textContent = fmt(curCpc);
  document.getElementById('s-total').textContent = fmt(G.totalSats);
  document.getElementById('s-clicks').textContent = fmt(G.clicks);
  document.getElementById('s-time').textContent = fmtTime(Date.now()-G.startTime);
  document.getElementById('s-prestige').textContent = `×${G.prestigeBonus}`;

  // Goal bar
  const nextM = MILESTONES.find(m => G.totalSats < m.sats);
  if (nextM) {
    const prevM = [...MILESTONES].reverse().find(m => G.totalSats >= m.sats);
    const from = prevM ? prevM.sats : 0;
    const pct = Math.min(100, ((G.totalSats-from)/(nextM.sats-from))*100);
    document.getElementById('goal-label').textContent = `${nextM.ico} ${nextM.title}: ${fmt(nextM.sats)} sats`;
    document.getElementById('goal-fill').style.width = pct+'%';
  } else {
    document.getElementById('goal-label').textContent = '🏆 Alle Ziele erreicht!';
    document.getElementById('goal-fill').style.width = '100%';
  }

  // Prestige
  const pb = document.getElementById('prestige-btn');
  if (G.totalSats >= 2.1e12) pb.classList.add('show');
  else pb.classList.remove('show');

  // Shop: rerender every 10 frames OR when dirty
  if (dirtyShop || frameCount % 10 === 0) {
    renderShop();
    renderUpgrades();
  }
}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
let lastTick = Date.now();

function tick() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  const earned = cps() * dt;
  if (earned > 0) { G.sats += earned; G.totalSats += earned; }
  updateUI();
  checkMilestones();
}

setInterval(tick, 50);
setInterval(saveGame, 20000);

// ═══════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════
function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(G));
    const sf = document.getElementById('save-flash');
    sf.style.opacity = '1';
    setTimeout(() => sf.style.opacity='0', 1200);
  } catch(e){}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    G.sats         = s.sats         || 0;
    G.totalSats    = s.totalSats    || 0;
    G.clicks       = s.clicks       || 0;
    G.prestigeBonus= s.prestigeBonus|| 1;
    G.prestigeCount= s.prestigeCount|| 0;
    G.upgrades     = s.upgrades     || [];
    G.milestones   = s.milestones   || [];
    G.startTime    = s.startTime    || Date.now();
    BUILDINGS.forEach(b => { G.buildings[b.id] = (s.buildings&&s.buildings[b.id])||0; });
  } catch(e){}
}

// ═══════════════════════════════════════════════
// MOBILE NAV
// ═══════════════════════════════════════════════
function mTab(tab) {
  ['left','center','right'].forEach(id => {
    document.getElementById(id).classList.remove('m-on');
  });
  ['mn-left','mn-center','mn-right'].forEach(id => {
    document.getElementById(id).classList.remove('on');
  });
  document.getElementById(tab).classList.add('m-on');
  document.getElementById('mn-'+tab).classList.add('on');
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadGame();
updateUI();
if (G.totalSats === 0) {
  setTimeout(() => showToast('₿','Willkommen!','Klick auf die Münze — oder Space drücken!'), 800);
}
</script>
