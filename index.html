<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sats Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #060608;
      --bg1:    #0e0e12;
      --bg2:    #16161c;
      --bg3:    #1e1e26;
      --bd:     #252530;
      --tx:     #f0f0f5;
      --tx2:    #888899;
      --tx3:    #555566;
      --orange: #f7931a;
      --gold:   #ffc93e;
      --green:  #22c55e;
      --red:    #ef4444;
      --purple: #a855f7;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--tx);
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    #topbar {
      flex-shrink: 0;
      background: var(--bg1);
      border-bottom: 1px solid var(--bd);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 10;
    }
    #topbar .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
    }
    #topbar .logo span { color: var(--tx2); font-weight: 400; }
    #sats-display {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    #sats-count {
      font-size: 26px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
      letter-spacing: -1px;
    }
    #sats-label { font-size: 13px; color: var(--tx2); font-weight: 500; }
    #cps-display {
      font-size: 13px;
      color: var(--tx2);
    }
    #cps-display strong { color: var(--orange); }

    /* ── MAIN LAYOUT ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg1);
      border-right: 1px solid var(--bd);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--tx3);
      margin-bottom: 4px;
    }

    /* Stats */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }
    .stat-row .label { color: var(--tx2); }
    .stat-row .val { font-family: 'JetBrains Mono', monospace; color: var(--tx); font-size: 11px; }

    /* Click upgrades */
    .upgrade-card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .upgrade-card:hover:not(.locked) { border-color: var(--orange); background: var(--bg3); }
    .upgrade-card.locked { opacity: .35; cursor: not-allowed; }
    .upgrade-card.bought { opacity: .3; cursor: default; border-color: var(--bd); }
    .upgrade-card .uico { font-size: 22px; }
    .upgrade-card .uinfo { flex: 1; }
    .upgrade-card .uname { font-size: 12px; font-weight: 600; }
    .upgrade-card .udesc { font-size: 10px; color: var(--tx2); margin-top: 1px; }
    .upgrade-card .ucost {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
      font-weight: 700;
    }

    /* ── CENTER ── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    #coin-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #coin {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffcf70, #f7931a 50%, #c85f00);
      box-shadow:
        0 0 0 6px #d47a0030,
        0 0 40px #f7931a55,
        0 20px 60px #00000088,
        inset 0 -8px 20px #00000040,
        inset 0 8px 20px #ffffff25;
      cursor: pointer;
      user-select: none;
      transition: transform .08s ease, box-shadow .08s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      will-change: transform;
    }
    #coin:active, #coin.pressing {
      transform: scale(.93);
      box-shadow:
        0 0 0 6px #d47a0015,
        0 0 20px #f7931a33,
        0 8px 30px #00000088,
        inset 0 -4px 10px #00000040,
        inset 0 8px 20px #ffffff15;
    }

    #coin-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid #f7931a22;
      animation: ring-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    #coin-ring2 {
      position: absolute;
      width: 244px;
      height: 244px;
      border-radius: 50%;
      border: 1px solid #f7931a11;
      animation: ring-pulse 2s ease-in-out infinite .6s;
      pointer-events: none;
    }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: .4; }
    }

    #click-label {
      font-size: 13px;
      color: var(--tx2);
    }
    #click-label strong { color: var(--orange); }

    /* Floating numbers */
    .floater {
      position: fixed;
      pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 8px #f7931a88;
      z-index: 9999;
      animation: float-up .9s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: .8; }
      100% { opacity: 0; transform: translateY(-80px) scale(.7); }
    }

    /* ── RIGHT PANEL (SHOP) ── */
    #right-panel {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg1);
      border-left: 1px solid var(--bd);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .building-card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s, opacity .15s;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .building-card:hover:not(.locked) { border-color: var(--orange); background: var(--bg3); }
    .building-card.locked { opacity: .3; cursor: not-allowed; }
    .building-card .bico { font-size: 28px; line-height: 1; }
    .building-card .binfo { flex: 1; min-width: 0; }
    .building-card .bname { font-size: 13px; font-weight: 700; }
    .building-card .bdesc { font-size: 10px; color: var(--tx2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .building-card .bright { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .building-card .bcost {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
      font-weight: 700;
    }
    .building-card.locked .bcost { color: var(--tx3); }
    .building-card .bcps { font-size: 10px; color: var(--tx2); }
    .building-count {
      position: absolute;
      top: 8px;
      right: 12px;
      background: var(--orange);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      border-radius: 20px;
      padding: 1px 7px;
      min-width: 24px;
      text-align: center;
    }

    /* ── ACHIEVEMENTS ── */
    #achievement-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg2);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      box-shadow: 0 8px 32px #00000088, 0 0 20px #ffc93e22;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }
    #achievement-toast.show { transform: translateX(-50%) translateY(0); }
    #achievement-toast .ach-ico { font-size: 24px; }
    #achievement-toast .ach-text strong { color: var(--gold); display: block; font-size: 12px; }

    /* ── MILESTONE PROGRESS ── */
    #milestone-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
    }
    .mbar-label {
      font-size: 10px;
      color: var(--tx2);
      text-align: center;
      margin-bottom: 4px;
    }
    .mbar-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
    }
    .mbar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      border-radius: 4px;
      transition: width .3s ease;
    }

    /* ── SCROLLBARS ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }

    /* ── PRESTIGE ── */
    #prestige-btn {
      margin-top: auto;
      padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #prestige-btn.visible { opacity: 1; pointer-events: all; }
    #prestige-btn:hover { filter: brightness(1.1); }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      html, body { overflow: hidden; height: 100dvh; }
      #topbar { height: 52px; padding: 0 14px; }
      #sats-count { font-size: 20px; }
      #main { flex-direction: column; overflow: hidden; }
      #left-panel, #right-panel { display: none; }
      #left-panel.mobile-active, #right-panel.mobile-active { display: flex; width: 100%; height: 100%; border: none; }
      #center { display: none; }
      #center.mobile-active { display: flex; flex: 1; }
      #coin { width: 160px; height: 160px; font-size: 72px; }
      #coin-ring { width: 178px; height: 178px; }
      #coin-ring2 { width: 198px; height: 198px; }

      #mobile-nav {
        display: flex;
        height: 56px;
        background: var(--bg1);
        border-top: 1px solid var(--bd);
        flex-shrink: 0;
      }
      .mnav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: none;
        color: var(--tx2);
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: color .15s;
      }
      .mnav-btn.active { color: var(--orange); }
      .mnav-btn .mico { font-size: 20px; }
    }

    @media (min-width: 701px) {
      #mobile-nav { display: none; }
      #center { display: flex !important; }
      #left-panel { display: flex !important; }
      #right-panel { display: flex !important; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">⚡ Sats<span>Clicker</span></div>
  <div id="sats-display">
    <span id="sats-count">0</span>
    <span id="sats-label">sats</span>
  </div>
  <div id="cps-display">⚙️ <strong id="cps-val">0</strong> sats/s</div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: Stats + Click Upgrades -->
  <div id="left-panel" class="mobile-active">
    <div>
      <div class="panel-title">Stats</div>
      <div class="stat-row"><span class="label">Gesamt gemint</span><span class="val" id="stat-total">0</span></div>
      <div class="stat-row"><span class="label">Klicks</span><span class="val" id="stat-clicks">0</span></div>
      <div class="stat-row"><span class="label">Pro Klick</span><span class="val" id="stat-cpc">1</span></div>
      <div class="stat-row"><span class="label">Laufzeit</span><span class="val" id="stat-time">0:00</span></div>
    </div>

    <div>
      <div class="panel-title">Klick-Upgrades</div>
      <div id="click-upgrades-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <button id="prestige-btn" onclick="prestige()">🌟 Prestige<br><span style="font-size:10px;font-weight:400;opacity:.8">Reset für 2× Bonus</span></button>
  </div>

  <!-- CENTER: Clicker -->
  <div id="center" class="mobile-active">
    <div id="coin-wrap">
      <div id="coin-ring2"></div>
      <div id="coin-ring"></div>
      <div id="coin" onclick="handleClick(event)">₿</div>
    </div>
    <div id="click-label">+<strong id="cpc-label">1</strong> sat pro Klick</div>

    <div id="milestone-bar">
      <div class="mbar-label" id="milestone-label">Nächstes Ziel: 100 sats</div>
      <div class="mbar-track"><div class="mbar-fill" id="mbar-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- RIGHT: Shop -->
  <div id="right-panel">
    <div class="panel-title">⛏️ Miner Shop</div>
    <div id="buildings-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>

</div>

<!-- MOBILE NAV -->
<div id="mobile-nav">
  <button class="mnav-btn" onclick="mobileTab('left')" id="mnav-stats">
    <span class="mico">📊</span>Stats
  </button>
  <button class="mnav-btn active" onclick="mobileTab('center')" id="mnav-click">
    <span class="mico">₿</span>Minen
  </button>
  <button class="mnav-btn" onclick="mobileTab('right')" id="mnav-shop">
    <span class="mico">🏪</span>Shop
  </button>
</div>

<!-- ACHIEVEMENT TOAST -->
<div id="achievement-toast">
  <span class="ach-ico" id="ach-ico">🏆</span>
  <div class="ach-text">
    <strong id="ach-title">Achievement</strong>
    <span id="ach-desc">Beschreibung</span>
  </div>
</div>

<script>
// ─── GAME DATA ────────────────────────────────────────────

const BUILDINGS = [
  { id:'laptop',    name:'Laptop',           icon:'💻', desc:'Ein staubiger Laptop mit cpuminer.',           baseCost:15,          baseCps:0.1   },
  { id:'gpu',       name:'GPU Rig',           icon:'🖥️', desc:'8× RTX 4090. Läuft heiß.',                   baseCost:100,         baseCps:0.5   },
  { id:'asic',      name:'ASIC Miner',        icon:'⚙️', desc:'Antminer S21 — laut aber effizient.',        baseCost:1100,        baseCps:4     },
  { id:'container', name:'Miner Container',   icon:'📦', desc:'Ein ganzer Container voller Miner.',         baseCost:12000,       baseCps:20    },
  { id:'farm',      name:'Mining Farm',       icon:'🏭', desc:'Industrielle Skalierung.',                   baseCost:130000,      baseCps:100   },
  { id:'pool',      name:'Mining Pool',       icon:'🌐', desc:'Tausende Miner koordiniert.',               baseCost:1400000,     baseCps:400   },
  { id:'lightning', name:'Lightning Node',    icon:'⚡', desc:'Millionen in Mikrozahlungen.',              baseCost:20000000,    baseCps:1600  },
  { id:'etf',       name:'Bitcoin ETF',       icon:'📈', desc:'Wall Street hat kapituliert.',              baseCost:330000000,   baseCps:6666  },
  { id:'satoshi',   name:"Satoshi's Laptop",  icon:'🔮', desc:'Das Original. Generiert Blöcke aus dem Nichts.', baseCost:5100000000, baseCps:26000 },
];

const CLICK_UPGRADES = [
  { id:'u1', name:'Mining Handschuhe',   icon:'🧤', cost:100,       bonus:1,    desc:'+1 sat/Klick'   },
  { id:'u2', name:'Spitzhacke',          icon:'⛏️', cost:500,       bonus:4,    desc:'+5 sat/Klick'   },
  { id:'u3', name:'Diamant Spitzhacke', icon:'💎', cost:3000,      bonus:15,   desc:'+20 sat/Klick'  },
  { id:'u4', name:'Quantenminer',        icon:'🔬', cost:20000,     bonus:50,   desc:'+50 sat/Klick'  },
  { id:'u5', name:'Erleuchtung',         icon:'🧘', cost:200000,    bonus:150,  desc:'+150 sat/Klick' },
  { id:'u6', name:'Satoshi Segen',       icon:'✨', cost:2000000,   bonus:500,  desc:'+500 sat/Klick' },
  { id:'u7', name:'Block Reward',        icon:'🏅', cost:25000000,  bonus:2000, desc:'+2k sat/Klick'  },
  { id:'u8', name:'Genesis Block',       icon:'🌍', cost:500000000, bonus:10000,desc:'+10k sat/Klick' },
];

const MILESTONES = [
  { sats:100,            ico:'🌱', title:'Erste Sats!',      desc:'100 sats gemint'         },
  { sats:1000,           ico:'⚡', title:'Kilosat',           desc:'1.000 sats gemint'       },
  { sats:10000,          ico:'🔥', title:'Zehntausend!',     desc:'10.000 sats gemint'      },
  { sats:100000,         ico:'💪', title:'Six Figures',      desc:'100.000 sats gemint'     },
  { sats:1000000,        ico:'🎰', title:'Sat Millionär',    desc:'1 Million sats gemint'   },
  { sats:10000000,       ico:'🚀', title:'To the Moon',      desc:'10 Mio. sats gemint'     },
  { sats:100000000,      ico:'₿',  title:'1 Bitcoin!',       desc:'Du hast 1 BTC gemint!'   },
  { sats:1000000000,     ico:'👑', title:'Bitcoin Baron',    desc:'10 BTC gemint'           },
  { sats:10000000000,    ico:'🌐', title:'Nakamoto Level',   desc:'100 BTC gemint'          },
  { sats:2100000000000, ico:'♾️', title:'21 Mio. BTC!',    desc:'Max Supply erreicht!'    },
];

// ─── STATE ────────────────────────────────────────────────

const SAVE_KEY = 'sats_clicker_v1';

let state = {
  sats: 0,
  totalSats: 0,
  clicks: 0,
  prestigeBonus: 1,
  prestigeCount: 0,
  buildings: {},    // id → count
  upgrades: [],     // bought upgrade ids
  achievements: [], // triggered milestone sat values
  startTime: Date.now(),
};

BUILDINGS.forEach(b => { state.buildings[b.id] = 0; });

// ─── COMPUTED ─────────────────────────────────────────────

function getSatsPerClick() {
  let base = 1;
  state.upgrades.forEach(id => {
    const u = CLICK_UPGRADES.find(x => x.id === id);
    if (u) base += u.bonus;
  });
  return base * state.prestigeBonus;
}

function getSatsPerSec() {
  let total = 0;
  BUILDINGS.forEach(b => {
    total += b.baseCps * (state.buildings[b.id] || 0);
  });
  return total * state.prestigeBonus;
}

function getBuildingCost(b) {
  const owned = state.buildings[b.id] || 0;
  return Math.floor(b.baseCost * Math.pow(1.15, owned));
}

// ─── FORMAT NUMBERS ───────────────────────────────────────

function fmt(n) {
  if (n < 0) return '0';
  n = Math.floor(n);
  if (n < 1000) return n.toString();
  if (n < 1e6)  return (n/1e3).toFixed(1).replace('.0','') + 'k';
  if (n < 1e9)  return (n/1e6).toFixed(2) + 'M';
  if (n < 1e12) return (n/1e9).toFixed(2) + 'B';
  if (n < 1e15) return (n/1e12).toFixed(2) + 'T';
  if (n < 1e18) return (n/1e15).toFixed(2) + 'Qa';
  return (n/1e18).toFixed(2) + 'Qi';
}

function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if (h > 0) return `${h}h ${m%60}m`;
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

// ─── CLICK ────────────────────────────────────────────────

function handleClick(e) {
  const gain = getSatsPerClick();
  state.sats += gain;
  state.totalSats += gain;
  state.clicks++;

  spawnFloater(e.clientX, e.clientY, gain);

  const coin = document.getElementById('coin');
  coin.classList.add('pressing');
  setTimeout(() => coin.classList.remove('pressing'), 80);

  updateUI();
  checkMilestones();
  saveGame();
}

function spawnFloater(x, y, val) {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = '+' + fmt(val);
  el.style.left = (x - 20 + Math.random()*40 - 20) + 'px';
  el.style.top  = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ─── BUILDINGS ────────────────────────────────────────────

function buyBuilding(id) {
  const b = BUILDINGS.find(x => x.id === id);
  if (!b) return;
  const cost = getBuildingCost(b);
  if (state.sats < cost) return;
  state.sats -= cost;
  state.buildings[id] = (state.buildings[id] || 0) + 1;
  updateUI();
  saveGame();
}

// ─── CLICK UPGRADES ───────────────────────────────────────

function buyUpgrade(id) {
  if (state.upgrades.includes(id)) return;
  const u = CLICK_UPGRADES.find(x => x.id === id);
  if (!u || state.sats < u.cost) return;
  state.sats -= u.cost;
  state.upgrades.push(id);
  updateUI();
  saveGame();
}

// ─── PRESTIGE ─────────────────────────────────────────────

function prestige() {
  if (state.totalSats < 2100000000000) return;
  state.prestigeCount++;
  state.prestigeBonus = Math.pow(2, state.prestigeCount);
  state.sats = 0;
  state.totalSats = 0;
  state.clicks = 0;
  state.upgrades = [];
  state.buildings = {};
  BUILDINGS.forEach(b => { state.buildings[b.id] = 0; });
  state.achievements = [];
  state.startTime = Date.now();
  saveGame();
  renderShop();
  updateUI();
  showAchievement('🌟', 'Prestige!', `${state.prestigeBonus}× Multiplikator aktiv`);
}

// ─── MILESTONES ───────────────────────────────────────────

function checkMilestones() {
  MILESTONES.forEach(m => {
    if (state.totalSats >= m.sats && !state.achievements.includes(m.sats)) {
      state.achievements.push(m.sats);
      showAchievement(m.ico, m.title, m.desc);
    }
  });
}

let toastTimer = null;
function showAchievement(ico, title, desc) {
  const toast = document.getElementById('achievement-toast');
  document.getElementById('ach-ico').textContent = ico;
  document.getElementById('ach-title').textContent = title;
  document.getElementById('ach-desc').textContent = desc;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
}

// ─── RENDER SHOP ──────────────────────────────────────────

function renderShop() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  BUILDINGS.forEach(b => {
    const cost = getBuildingCost(b);
    const owned = state.buildings[b.id] || 0;
    const canBuy = state.sats >= cost;
    const card = document.createElement('div');
    card.className = 'building-card' + (canBuy ? '' : ' locked');
    card.onclick = () => buyBuilding(b.id);

    card.innerHTML = `
      <div class="bico">${b.icon}</div>
      <div class="binfo">
        <div class="bname">${b.name}</div>
        <div class="bdesc">${b.desc}</div>
      </div>
      <div class="bright">
        <div class="bcost">${fmt(cost)}</div>
        <div class="bcps">+${fmt(b.baseCps)}/s</div>
      </div>
      ${owned > 0 ? `<div class="building-count">${owned}</div>` : ''}
    `;
    list.appendChild(card);
  });
}

function renderClickUpgrades() {
  const list = document.getElementById('click-upgrades-list');
  list.innerHTML = '';
  CLICK_UPGRADES.forEach(u => {
    const bought = state.upgrades.includes(u.id);
    const canBuy = state.sats >= u.cost && !bought;
    const card = document.createElement('div');
    card.className = 'upgrade-card' + (bought ? ' bought' : canBuy ? '' : ' locked');
    if (!bought) card.onclick = () => buyUpgrade(u.id);
    card.innerHTML = `
      <div class="uico">${u.icon}</div>
      <div class="uinfo">
        <div class="uname">${u.name}</div>
        <div class="udesc">${u.desc}</div>
      </div>
      ${bought ? '<span style="font-size:14px">✅</span>' : `<div class="ucost">${fmt(u.cost)}</div>`}
    `;
    list.appendChild(card);
  });
}

// ─── UI UPDATE ────────────────────────────────────────────

let lastRenderSats = -1;

function updateUI() {
  const sats = Math.floor(state.sats);
  const cps = getSatsPerSec();
  const cpc = getSatsPerClick();

  document.getElementById('sats-count').textContent = fmt(sats);
  document.getElementById('cps-val').textContent = fmt(cps);
  document.getElementById('cpc-label').textContent = fmt(cpc);
  document.getElementById('stat-total').textContent = fmt(state.totalSats);
  document.getElementById('stat-clicks').textContent = fmt(state.clicks);
  document.getElementById('stat-cpc').textContent = fmt(cpc);
  document.getElementById('stat-time').textContent = fmtTime(Date.now() - state.startTime);

  // Milestone bar
  const nextM = MILESTONES.find(m => state.totalSats < m.sats);
  if (nextM) {
    const prevM = MILESTONES.slice().reverse().find(m => state.totalSats >= m.sats);
    const from = prevM ? prevM.sats : 0;
    const to = nextM.sats;
    const pct = Math.min(100, ((state.totalSats - from) / (to - from)) * 100);
    document.getElementById('milestone-label').textContent = `Ziel: ${fmt(nextM.sats)} sats (${nextM.title})`;
    document.getElementById('mbar-fill').style.width = pct + '%';
  } else {
    document.getElementById('milestone-label').textContent = '🏆 Alle Ziele erreicht!';
    document.getElementById('mbar-fill').style.width = '100%';
  }

  // Prestige button
  const pb = document.getElementById('prestige-btn');
  if (state.totalSats >= 2100000000000) pb.classList.add('visible');
  else pb.classList.remove('visible');

  // Only re-render shop if sats crossed a building threshold
  renderShop();
  renderClickUpgrades();
}

// ─── GAME LOOP ────────────────────────────────────────────

let lastTick = Date.now();
let ticksSinceRender = 0;

function gameTick() {
  const now = Date.now();
  const delta = (now - lastTick) / 1000;
  lastTick = now;

  const cps = getSatsPerSec();
  if (cps > 0) {
    const earned = cps * delta;
    state.sats += earned;
    state.totalSats += earned;
  }

  ticksSinceRender++;
  if (ticksSinceRender >= 3) { // ~15fps render
    updateUI();
    checkMilestones();
    ticksSinceRender = 0;
  }
}

setInterval(gameTick, 50);

// Auto-save every 30s
setInterval(saveGame, 30000);

// ─── SAVE / LOAD ──────────────────────────────────────────

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // Merge carefully
    state.sats = saved.sats || 0;
    state.totalSats = saved.totalSats || 0;
    state.clicks = saved.clicks || 0;
    state.prestigeBonus = saved.prestigeBonus || 1;
    state.prestigeCount = saved.prestigeCount || 0;
    state.upgrades = saved.upgrades || [];
    state.achievements = saved.achievements || [];
    state.startTime = saved.startTime || Date.now();
    BUILDINGS.forEach(b => {
      state.buildings[b.id] = (saved.buildings && saved.buildings[b.id]) || 0;
    });
  } catch(e) {}
}

// ─── MOBILE NAV ───────────────────────────────────────────

function mobileTab(tab) {
  document.getElementById('left-panel').classList.remove('mobile-active');
  document.getElementById('center').classList.remove('mobile-active');
  document.getElementById('right-panel').classList.remove('mobile-active');
  document.getElementById('mnav-stats').classList.remove('active');
  document.getElementById('mnav-click').classList.remove('active');
  document.getElementById('mnav-shop').classList.remove('active');

  if (tab === 'left') {
    document.getElementById('left-panel').classList.add('mobile-active');
    document.getElementById('mnav-stats').classList.add('active');
  } else if (tab === 'center') {
    document.getElementById('center').classList.add('mobile-active');
    document.getElementById('mnav-click').classList.add('active');
  } else {
    document.getElementById('right-panel').classList.add('mobile-active');
    document.getElementById('mnav-shop').classList.add('active');
  }
}

// ─── INIT ─────────────────────────────────────────────────

loadGame();
updateUI();

// Show welcome toast after 1s if new game
if (state.totalSats === 0) {
  setTimeout(() => showAchievement('₿', 'Willkommen!', 'Klick auf die Münze um Sats zu minen'), 1000);
}

</script>
